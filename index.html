<!doctype html><html lang="de"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Culinary OS">
<meta name="theme-color" content="#b5651d">
<title>Culinary OS</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23b5651d'/%3E%3Ctext x='90' y='124' font-size='96' text-anchor='middle' fill='%23fff' font-family='Georgia'%3E%F0%9F%8D%B3%3C/text%3E%3C/svg%3E">
<style>
:root{--bg:#faf7f2;--card:#fff;--ink:#211f1b;--mut:#6b6862;--mut2:#9b968c;--acc:#b5651d;--line:#ece7dd;--soft:#f7f3ec;--teal:#0f6e56;--tealbg:#e1f5ee;--amber:#854f0b;--amberbg:#faeeda;--violet:#4a3f8a;--violetbg:#eceaf6}
body.dark{--bg:#161310;--card:#221d18;--ink:#f1ebe1;--mut:#b0a698;--mut2:#857d71;--acc:#e08a3c;--line:#352e26;--soft:#221d17;--teal:#46c4a0;--tealbg:#123a30;--amber:#d99a45;--amberbg:#3a2c16;--violet:#9a8fd8;--violetbg:#272240;color-scheme:dark}
body.dark .topbar{background:rgba(22,19,16,.92)}
body.dark .nav{background:rgba(26,22,18,.96)}
body.dark .search,body.dark .fsel,body.dark .fclear,body.dark .chip,body.dark .serv button,body.dark .btn-s,body.dark .cstep,body.dark .cgroup,body.dark .useup .urec{background:var(--card)}
body.dark .ck{border-color:#5a5045}
body.dark .useup{background:linear-gradient(180deg,#2a2017,#1f1a14);border-color:#4a3826}
.themetgl{position:fixed;top:9px;right:11px;z-index:40;font-size:19px;cursor:pointer;line-height:1;padding:4px;opacity:.9}
.chatfab{position:fixed;bottom:72px;right:14px;z-index:38;width:50px;height:50px;border-radius:50%;background:var(--acc);color:#fff;display:flex;align-items:center;justify-content:center;font-size:23px;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.28)}
.chatov{position:fixed;inset:0;z-index:60;background:var(--bg);display:flex;flex-direction:column}
.chathead{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--line)}
.chathead .close{color:var(--acc);font-weight:600;cursor:pointer;font-size:14px}
.chatbody{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.chathint{color:var(--mut2);font-size:13.5px;line-height:1.5}
.cmsg{max-width:85%;padding:9px 13px;border-radius:14px;font-size:14.5px;line-height:1.45;white-space:pre-wrap}
.cmsg.user{align-self:flex-end;background:var(--acc);color:#fff;border-bottom-right-radius:4px}
.cmsg.assistant{align-self:flex-start;background:var(--card);border:1px solid var(--line);border-bottom-left-radius:4px}
.chatin{display:flex;gap:8px;padding:10px 14px calc(10px + env(safe-area-inset-bottom));border-top:1px solid var(--line)}
.chatin input{flex:1;padding:11px 13px;border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--ink);font-size:15px}
.chatin button{flex:0 0 auto;width:46px;border:none;border-radius:12px;background:var(--acc);color:#fff;font-size:20px;cursor:pointer}
.tbrow{display:flex;justify-content:space-between;align-items:center;gap:10px}
.impbtn{flex:0 0 auto;background:var(--soft);border:1px solid var(--line);color:var(--acc);font-weight:600;font-size:12.5px;border-radius:9px;padding:6px 11px;cursor:pointer}
.imparea{width:100%;min-height:120px;margin:10px 0;padding:11px 13px;border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--ink);font-size:14px;font-family:inherit;resize:vertical}
.imprev{margin-top:14px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px}
.imprev h3{color:var(--acc);font-size:17px;margin-bottom:6px}
.impc{margin-top:10px}
.impc ul,.impc ol{margin:4px 0 0 18px;font-size:13.5px;line-height:1.5}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased;padding-bottom:calc(64px + env(safe-area-inset-bottom))}
h1,h2,h3{font-family:Georgia,'Times New Roman',serif;font-weight:600;margin:0}
a{color:inherit}
.wrap{max-width:760px;margin:0 auto;padding:14px 14px 0}
.topbar{position:sticky;top:0;z-index:20;background:rgba(250,247,242,.92);backdrop-filter:blur(8px);padding:12px 14px 8px;border-bottom:1px solid var(--line)}
.topbar h1{font-size:21px;color:var(--acc);letter-spacing:.01em}
.topbar .sub{font-size:11.5px;color:var(--mut2);margin-top:1px}
.search{width:100%;margin-top:10px;padding:11px 13px;border:1px solid var(--line);border-radius:12px;background:#fff;font-size:15px;color:var(--ink)}
.filters{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.fsel{flex:1 1 30%;min-width:0;padding:8px 7px;border:1px solid var(--line);border-radius:10px;background:#fff;font-size:12.5px;color:var(--ink)}
.fclear{flex:0 0 auto;padding:8px 12px;border:1px solid var(--acc);border-radius:10px;background:#fff;color:var(--acc);font-weight:700;font-size:13px;cursor:pointer}
.chips{display:flex;gap:7px;overflow-x:auto;padding:10px 14px 4px;-webkit-overflow-scrolling:touch}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;font-size:12.5px;padding:7px 13px;border-radius:999px;background:#fff;border:1px solid var(--line);color:var(--mut);white-space:nowrap;cursor:pointer}
.chip.on{background:var(--acc);color:#fff;border-color:var(--acc)}
.count{padding:4px 14px 0;font-size:12px;color:var(--mut2)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px 14px 24px}
@media(max-width:520px){.grid{grid-template-columns:1fr}}
.rc{position:relative;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;cursor:pointer;display:flex;flex-direction:column;gap:6px;transition:transform .06s}
.rc:active{transform:scale(.985)}
.rc .slot{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--acc);font-weight:700}
.rc h3{font-size:16px;line-height:1.2}
.rc .sb{font-size:12.5px;color:var(--mut);line-height:1.35;flex:1}
.rc .meta{display:flex;flex-wrap:wrap;gap:8px;font-size:11.5px;color:var(--mut2);margin-top:2px}
.rc .meta b{color:var(--ink);font-weight:600}
.rc .fav{position:absolute;top:8px;right:10px;font-size:20px;line-height:1;color:var(--mut2);cursor:pointer;z-index:2;padding:2px}
.rc .fav.on{color:#e3a700}
.rc .slot{padding-right:26px}
.recent{margin:10px 14px 2px}
.recent .rlbl{font-size:12px;color:var(--mut2);font-weight:600;margin-bottom:6px}
.recent .rrow{display:flex;gap:9px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.recent .rcard{flex:0 0 auto;width:134px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:9px 10px;cursor:pointer}
.recent .rcs{font-size:9.5px;color:var(--acc);font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.recent .rct{font-size:12.5px;font-weight:600;margin-top:3px;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.heute{margin:10px 14px 0;background:linear-gradient(180deg,var(--soft),var(--card));border:1px solid var(--line);border-radius:14px;padding:12px 14px}
.heute .hl{font-size:13px;font-weight:700;color:var(--acc);margin-bottom:6px}
.heute .hsug{padding:8px 0;border-top:1px solid var(--soft);cursor:pointer}
.heute .hsug:first-of-type{border-top:none}
.heute .hst{font-weight:600;font-size:14.5px}
.heute .hsr{font-size:11.5px;color:var(--mut2);margin-top:1px}
.pill{font-size:10.5px;padding:3px 8px;border-radius:999px;background:var(--soft);color:var(--mut)}
/* detail */
.sheet{padding:0 0 30px}
.back{display:inline-flex;align-items:center;gap:6px;font-size:14px;color:var(--acc);padding:12px 14px 4px;cursor:pointer;font-weight:600}
.hero{padding:6px 16px 0}
.hero .over{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--acc);font-weight:700}
.hero h2{font-size:25px;line-height:1.15;margin:6px 0 0}
.hero .sub{font-family:Georgia,serif;font-style:italic;color:var(--mut);font-size:15px;margin:8px 0 0}
.metar{display:flex;flex-wrap:wrap;gap:14px;font-size:13px;color:var(--mut);margin:14px 16px 0}
.metar b{color:var(--ink)}
.sec{margin:16px 14px 0;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px}
.sec .lbl{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--mut2);margin-bottom:11px}
.flav{display:flex;gap:14px;align-items:center}
.flav .txt{font-size:13px;color:var(--ink);line-height:1.5}
.macros{display:flex;flex-wrap:wrap;gap:9px}
.mac{flex:1;min-width:60px;background:var(--soft);border-radius:11px;padding:10px 6px;text-align:center}
.mac b{display:block;font-size:18px}
.mac span{font-size:10.5px;color:var(--mut2)}
.serv{display:flex;align-items:center;gap:10px;margin:14px 16px 0;font-size:14px;color:var(--mut)}
.serv button{width:34px;height:34px;border-radius:50%;border:1px solid var(--line);background:#fff;font-size:18px;color:var(--acc);cursor:pointer}
.serv b{color:var(--ink);font-size:15px;min-width:78px;text-align:center}
.comp{margin-top:12px;border:1px solid var(--line);border-radius:14px;padding:14px}
.comp .ch{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.comp h3{font-size:15.5px}
.comp .cd{font-size:12.5px;color:var(--mut2);margin:3px 0 10px}
.badge{font-size:10px;padding:3px 9px;border-radius:999px;white-space:nowrap;font-weight:600}
.b-amber{background:var(--amberbg);color:var(--amber)}.b-teal{background:var(--tealbg);color:var(--teal)}
.ing{list-style:none;margin:0;padding:0;font-size:14.5px}
.ing li{display:flex;align-items:baseline;gap:10px;padding:7px 2px;border-bottom:1px solid var(--soft)}
.ing .q{order:-1;flex:0 0 auto;min-width:64px;text-align:center;color:var(--acc);font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap;background:var(--soft);border:1px solid var(--line);border-radius:8px;padding:3px 9px;font-size:13px}
.ing .n{font-weight:600;color:var(--ink)}
.ing .opt{color:var(--mut2);font-size:11px;font-weight:400}
.steps{margin:10px 0 0;padding-left:20px;font-size:14px;line-height:1.55}
.steps li{margin-bottom:7px}
.tmr{display:inline-block;font-size:11px;color:var(--teal);background:var(--tealbg);border-radius:6px;padding:1px 7px;margin-left:6px;cursor:pointer}
.btnrow{display:flex;gap:10px;margin:18px 16px 0}
.btn{flex:1;text-align:center;padding:14px;border-radius:13px;border:none;font-size:15px;font-weight:600;cursor:pointer}
.btn-p{background:var(--acc);color:#fff}
.btn-s{background:#fff;color:var(--acc);border:1px solid var(--acc)}
.pairbadge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--teal);background:var(--tealbg);border:1px solid #c5e8db;border-radius:999px;padding:2px 9px;margin-bottom:7px}
/* nav */
.nav{position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;background:rgba(255,255,255,.96);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
.nav button{flex:1;background:none;border:none;padding:9px 0 8px;font-size:10.5px;color:var(--mut2);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.nav button .ic{font-size:21px;line-height:1}
.nav button.on{color:var(--acc)}
.badge-n{position:absolute;transform:translate(12px,-6px);background:var(--acc);color:#fff;font-size:9px;font-weight:700;border-radius:999px;padding:1px 5px}
/* plan */
.day{margin:9px 14px 0;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:9px 13px}
.day h3{font-size:13.5px;color:var(--acc);display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px}
.ptag{font-size:10px;font-weight:700;color:var(--teal);background:var(--tealbg);border-radius:6px;padding:1px 6px;margin-left:5px;vertical-align:middle}
.mrow{display:flex;align-items:center;gap:9px;padding:6px 0;border-top:1px solid var(--soft);font-size:13.5px}
.mrow:first-of-type{border-top:none}
.mrow .mb{flex:0 0 auto;font-size:15px;width:22px;text-align:center}
.mrow .t{flex:1;min-width:0;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mrow .k{color:var(--mut2);font-weight:400;font-size:11.5px}
.mrow.eslot .addh{color:var(--mut2);font-weight:500}
.mrow .x{color:#b23;font-size:17px;cursor:pointer;flex:0 0 auto;padding:0 3px}
.mrow .chev{color:var(--mut2);font-size:15px;flex:0 0 auto;padding:0 3px}
.dayfoot{display:flex;justify-content:space-between;align-items:center;margin-top:6px;border-top:1px dashed var(--line);padding-top:5px}
.addmeal{font-size:12px;color:var(--acc);font-weight:600;cursor:pointer;padding:3px 2px}
.dayclr{font-size:11.5px;color:var(--mut2);cursor:pointer;padding:3px 2px}
.day h3 .dk{font-size:11.5px;color:var(--mut2);font-weight:400}
.day h3 .dk.dkok{color:var(--teal);font-weight:600}
.day h3 .dk.dkover{color:#e67e22;font-weight:600}
.day .empty{font-size:12.5px;color:var(--mut2);padding:8px 0}
.prow{display:flex;justify-content:space-between;align-items:center;gap:9px;padding:8px 0;border-top:1px solid var(--soft);font-size:14px}
.prow:first-of-type{border-top:none}
.prow .x{color:#b23;font-size:18px;cursor:pointer;padding:0 4px;flex:0 0 auto}
.prow .slotb{flex:0 0 auto;font-size:10px;font-weight:700;color:var(--acc);background:var(--soft);border:1px solid var(--line);border-radius:7px;padding:2px 7px;white-space:nowrap;min-width:74px;text-align:center}
.prow .t{flex:1;cursor:pointer;min-width:0}
.prow .k{font-size:11px;color:var(--mut2)}
.addslot{margin-top:9px;width:100%;background:var(--soft);border:1px dashed var(--line);color:var(--acc);border-radius:10px;padding:9px;font-size:13px;font-weight:600;cursor:pointer}
.planbar{margin:12px 14px 0;display:flex;gap:8px}
.planbar .btn{flex:1}
.prow.eslot{cursor:pointer}
.prow .addh{color:var(--mut2);font-weight:500}
.prow .chev{flex:0 0 auto;color:var(--mut2);font-size:16px;padding:0 2px}
.prow.filled .slotb{background:var(--tealbg);color:var(--teal);border-color:transparent}
.spsearch{padding:10px 14px;border-bottom:1px solid var(--line)}
.spsearch input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--ink);font-size:15px}
.spc{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 13px;cursor:pointer}
.spc:active{transform:scale(.99)}
.spt{font-size:15px;font-weight:600;color:var(--ink)}
.spm{font-size:12px;color:var(--mut2);margin-top:3px}
.sptag{color:var(--acc);font-weight:600}
.spgrp{font-size:11.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--mut2);margin:6px 2px 0}
.spc.sprand{text-align:center;font-weight:700;color:var(--acc);background:var(--soft);border-style:dashed}
.rate{display:flex;align-items:center;justify-content:space-between;margin:2px 16px 6px;padding:8px 0}
.rate .rlbl2{font-size:13px;color:var(--mut);font-weight:600}
.starrow .star{font-size:25px;cursor:pointer;padding:0 2px;color:var(--mut2)}
.starrow .star.on{color:#e3a700}
.mprev{font-size:12.5px;color:var(--mut2);padding:6px 0 2px;line-height:1.4}
.menucard{margin:10px 16px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:28px 22px}
.mctitle{font-family:Georgia,serif;font-size:24px;text-align:center;color:var(--acc);line-height:1.2}
.mcrule{text-align:center;color:var(--mut2);letter-spacing:.3em;margin:6px 0 2px;font-size:13px}
.mcourse{margin-top:22px;text-align:center}
.mcl{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--mut2);margin-bottom:8px}
.mcdish{margin:9px 0}
.mct{font-family:Georgia,serif;font-size:17.5px}
.mcs{font-family:Georgia,serif;font-style:italic;font-size:13.5px;color:var(--mut);margin-top:2px}
.mcx{color:#b23;cursor:pointer;font-size:15px;margin-left:8px}
.subrow{display:flex;gap:10px;padding:7px 0;border-top:1px solid var(--soft);font-size:13.5px}
.subrow:first-of-type{border-top:none}
.subn{flex:0 0 38%;font-weight:600;min-width:0}
.suba{flex:1;color:var(--mut)}
/* shopping */
.aisle{margin:14px 14px 0}
.aisle h3{font-size:13px;color:var(--acc);text-transform:capitalize;margin-bottom:6px}
.shl{list-style:none;margin:0;padding:0;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.shl li{display:flex;align-items:flex-start;gap:11px;padding:11px 13px;border-top:1px solid var(--soft);font-size:14.5px;cursor:pointer}
.shn{flex:1;min-width:0}
.shnm{font-weight:600;font-size:14.5px}
.shbrk{margin-top:4px;display:flex;flex-direction:column;gap:1px}
.shl3{display:flex;justify-content:space-between;gap:10px;max-width:235px;font-size:11.5px;line-height:1.5}
.shl3 span{color:var(--mut2)}
.shl3 b{font-variant-numeric:tabular-nums;color:var(--ink);font-weight:600}
.shl3 b.restbuy{color:var(--acc)}
.shl3 b.restok{color:var(--teal)}
.shrec{margin-top:5px;font-size:11px;color:var(--mut2)}
.shreclink{color:var(--acc);cursor:pointer;border-bottom:1px dotted var(--acc)}
.shl li.have .shnm{color:var(--mut)}
.cit{display:flex;gap:10px;align-items:flex-start;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:10px 12px;margin-bottom:9px}
.cit .pic{width:32px;height:32px;border-radius:9px;background:var(--soft);display:flex;align-items:center;justify-content:center;font-size:16px;flex:0 0 auto}
.cit .mid{flex:1;min-width:0}
.cit .ing{font-size:10.5px;color:var(--mut2);text-transform:uppercase;letter-spacing:.02em}
.cit .prod{font-size:14px;font-weight:700;line-height:1.25;margin-top:1px}
.cit .cmeta{font-size:11px;color:var(--mut);margin-top:3px}
.cit .right{flex:0 0 auto;text-align:right}
.cit .cpr{font-size:14px;font-weight:800;color:var(--acc);font-variant-numeric:tabular-nums}
.cit .cacts{display:flex;gap:6px;justify-content:flex-end;margin-top:6px}
.cit .cact{font-size:13px;background:var(--soft);border:1px solid var(--line);border-radius:8px;padding:3px 8px;cursor:pointer;color:var(--acc);font-weight:600}
.cit.miss .prod{font-weight:600;color:var(--mut)}
.bbio{background:var(--tealbg);color:var(--teal);font-weight:700;font-size:9px;padding:1px 5px;border-radius:5px;vertical-align:middle}
.bpin{font-size:10px}
.oth{color:var(--teal);font-weight:700}
.chint{display:flex;gap:9px;align-items:flex-start;background:var(--amberbg);border:1px solid #f0d9b0;border-radius:12px;padding:10px 12px;margin-bottom:11px}
.chint .ic{font-size:15px}
.chint .hx{font-size:12px;color:var(--amber);line-height:1.45}
.chint .lnk{color:var(--acc);font-weight:700;border-bottom:1px dotted var(--acc);cursor:pointer;display:inline-block;margin-top:3px}
.sum{display:flex;justify-content:space-between;align-items:center;margin:8px 14px 0;padding:11px 14px;background:var(--card);border:1px solid var(--line);border-radius:13px}
.sum .l{font-size:12.5px;color:var(--mut)}
.sum .v{font-size:18px;font-weight:800;color:var(--acc);font-variant-numeric:tabular-nums}
.shl li:first-child{border-top:none}
.shl li.done{color:var(--mut2);text-decoration:line-through}
.ck{width:20px;height:20px;border:1.5px solid #c9c3b6;border-radius:6px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff}

function spider(fl){const cx=120,cy=96,Rr=64,n=FL.length;
  const pt=(i,fr)=>{const a=(-90+i*360/n)*Math.PI/180;return [cx+Rr*fr*Math.cos(a),cy+Rr*fr*Math.sin(a)];};

  return `<svg viewBox="0 0 240 200" width="190" height="158" style="overflow:visible">${rings}${ax}<polygon points="${dp}" fill="rgba(74,63,138,.16)" stroke="#4a3f8a" stroke-width="1.6"/>${dots}${lab}</svg>`;
}

/* ---------- RECIPES ---------- */

  var bars=data.map(function(d,i){var h=Math.round((d.val/max)*H);var x=i*gap+(gap-bw)/2;return '<rect x="'+x.toFixed(1)+'" y="'+(H-h)+'" width="'+bw.toFixed(1)+'" height="'+Math.max(h,d.val>0?2:0)+'" rx="2" fill="var(--acc)"/>';}).join('');
  var gl='';if(goal){var gy=H-Math.round((goal/max)*H);gl='<line x1="0" y1="'+gy+'" x2="'+W+'" y2="'+gy+'" stroke="var(--teal)" stroke-dasharray="4 3" stroke-width="1.5"/><text x="'+W+'" y="'+(gy-3>8?gy-3:10)+'" font-size="9" fill="var(--teal)" text-anchor="end">Ziel</text>';}

  return '<svg viewBox="0 0 '+W+' '+(H+16)+'" width="100%" style="max-width:340px;height:auto">'+gl+bars+labs+'</svg>';}
function dinnerSuggestions(){var fav=getFav(),recent=getRecent(),out=[],used={};
  function add(r,reason){if(r&&!used[r.id]){used[r.id]=1;out.push({r:r,reason:reason});}}

/* ---------- PLAN (Slot-Planer wie Notion) ---------- */
const PROT_E={beef:'🥩',rind:'🥩',chicken:'🍗',huhn:'🍗',hähnchen:'🍗',fish:'🐟',fisch:'🐟',pork:'🥓',schwein:'🥓',veggie:'🥦',vegetarisch:'🥦',vegan:'🌱',lamb:'🐑',lamm:'🐑',seafood:'🦐'};

const PROT_DEF={chicken:{l:'Chicken',e:'🍗',slots:['Chicken-1','Chicken-2']},beef:{l:'Rind',e:'🥩',slots:['Beef']},veg:{l:'Veggie',e:'🥦',slots:['Veg-Mi','Veg-So']},fish:{l:'Fisch',e:'🐟',slots:['Fish']},cheat:{l:'Cheat-Day',e:'🍔',slots:['Cheat','Flex']}};

const MEAL_E={fruehstueck:'🍳',haupt:'🍽',snack:'🍎'};
const DAY_MEALS=['fruehstueck','haupt']; // pro Tag vorbelegt
function dayProt(i){return PROT_DEF[DAY_PROT[i]]||PROT_DEF.chicken;}
function protEmo(r){var p=(r&&r.protein||'').toLowerCase();return PROT_E[p]||'';}
function isBreakfast(r){var c=(r.category_label||'').toLowerCase();return c.indexOf('breakfast')>=0||c.indexOf('frühstück')>=0||c.indexOf('porridge')>=0||c.indexOf('egg')>=0||c.indexOf('pancake')>=0||c.indexOf('toast')>=0||c.indexOf('müsli')>=0||c.indexOf('granola')>=0||(!!r.mahlzeit&&(r.mahlzeit.join?r.mahlzeit.join(' '):'').toLowerCase().indexOf('frühstück')>=0);}
// candFor(day,kind): Filter-Funktion für den Picker. Hauptgericht = nur Protein-Slots des Tages; Frühstück = nur Frühstücks-Rezepte; Snack = alles.
function candFor(day,kind){if(kind==='haupt'){var sl=dayProt(day).slots;return function(r){return sl.indexOf(r.slot)>=0;};}if(kind==='fruehstueck')return isBreakfast;return function(){return true;};}
function getPlan(){var p=store.get('plan',{});var ch=false;
  Object.keys(p).forEach(function(d){var v=p[d];
    if(Array.isArray(v)){var o={};v.forEach(function(id){o.haupt=id;});p[d]=v=o;ch=true;}
    if(v&&typeof v==='object'){Object.keys(v).forEach(function(k){if(MEALK.indexOf(k)<0){var id=v[k];delete v[k];if(id&&!v.haupt)v.haupt=id;ch=true;}});}});
  if(ch)store.set('plan',p);return p;}
function planIds(p){p=p||getPlan();var o=[];Object.keys(p).forEach(function(d){var ds=p[d];if(ds)Object.keys(ds).forEach(function(s){if(ds[s])o.push(ds[s]);});});return o;}
function dayKcal(ds){if(!ds)return 0;return Object.keys(ds).reduce(function(a,s){var r=byId(ds[s]);return a+((r&&r.macros_per_serving&&r.macros_per_serving.kcal)||0);},0);}
function addToPlan(id){var r=byId(id);

function planScore(r){var sc=getFav()[r.id]?10:0;var soonN=(P||[]).filter(function(it){return it.days!==null&&it.days<=6;}).map(function(it){return (it.name||'').toLowerCase();}).filter(function(n){return n.length>=4;});

  return sc;}
function mealLabel(day,kind){return kind==='haupt'?(dayProt(day).e+' '+dayProt(day).l):(MEAL_E[kind]+' '+MEAL_L[kind]);}

function renderSlotPicker(){var ex=document.getElementById('spEl');if(ex)ex.remove();if(!slotPick)return;var s=slotPick;
  var el=document.createElement('div');el.className='chatov';el.id='spEl';

function renderSlotPickerBody(){var b=document.getElementById('spBody');if(!b||!slotPick)return;var s=slotPick;var q=(s.q||'').toLowerCase().trim();var fil=candFor(s.day,s.kind);
  var all=R.slice();

  var match=all.filter(fil),other=all.filter(function(r){return !fil(r);});
  function srt(a,b){return planScore(b)-planScore(a)||(a.title||'').localeCompare(b.title||'');}
  match.sort(srt);other.sort(srt);
  function card(r){var fav=getFav()[r.id];var meta=[];if(r.macros_per_serving&&r.macros_per_serving.kcal)meta.push(r.macros_per_serving.kcal+' kcal');if(r.total_minutes)meta.push(r.total_minutes+' min');if(r.category_label)meta.push(esc(r.category_label));if(r.cuisine&&r.cuisine.length)meta.push(esc(r.cuisine[0]));

  if(other.length){
    if(s.all||q)h+='<div class="spgrp">Andere · '+other.length+'</div>'+other.map(card).join('');

  }

function pickRandom(){if(!slotPick)return;var s=slotPick;var fil=candFor(s.day,s.kind);var c=R.filter(fil);if(!c.length)c=R.slice();if(!c.length)return;var mx=Math.max.apply(null,c.map(planScore));var top=c.filter(function(x){return planScore(x)===mx;});assignSlot(s.day,s.kind,top[Math.floor(Math.random()*top.length)].id);}
function assignSlot(day,kind,id){var p=getPlan();p[day]=p[day]||{};p[day][kind]=id;store.set('plan',p);closeModal();closeSlotPicker();render();}
function rmPlan(day,kind){var p=getPlan();if(p[day]){delete p[day][kind];if(!Object.keys(p[day]).length)delete p[day];}store.set('plan',p);render();}
function suggestWeek(){if(!confirm('Leere Hauptgerichte mit je 1 Vorschlag füllen (Protein des Tages · Favoriten & Vorrat bevorzugt)?'))return;var p=getPlan();
  DAYS.forEach(function(d,i){if(p[i]&&p[i].haupt)return;var fil=candFor(i,'haupt');var c=R.filter(fil);if(!c.length)return;var mx=Math.max.apply(null,c.map(planScore));var top=c.filter(function(x){return planScore(x)===mx;});p[i]=p[i]||{};p[i].haupt=top[Math.floor(Math.random()*top.length)].id;});

function autoPlanWeek(){
  if(!confirm('Hauptgerichte der ganzen Woche automatisch planen (Protein-Rotation des Tages)? Überschreibt den Plan.'))return;

  DAYS.forEach(function(d,i){var fil=candFor(i,'haupt');var cands=R.filter(function(r){return fil(r)&&!used[r.id];});if(!cands.length)cands=R.filter(fil);if(!cands.length)return;var mx=Math.max.apply(null,cands.map(planScore));var top=cands.filter(function(c){return planScore(c)===mx;});var pick=top[Math.floor(Math.random()*top.length)];used[pick.id]=1;plan[i]={haupt:pick.id};});

  if(P===null)loadPantry();

  ids.forEach(id=>{const r=byId(id);if(!r)return;r.components.forEach(c=>c.ingredients.forEach(i=>{

    const e=agg[a][key]=agg[a][key]||{u:{},rec:{}};
    const u=i.unit||'';e.u[u]=(e.u[u]||0)+(+i.qty||0);e.rec[id]=r.title;
  }));});
  const done=store.get('shop_done',{});
  const order=Object.keys(AISLE_DE).filter(a=>agg[a]);
  let buyN=0,haveN=0;

    const e=agg[a][nm];let covered=true,anyHave=false,buyParts=[],lines='';

      h+='<li class="hrow" style="cursor:pointer" onclick="openIngredient(\''+encodeURIComponent(it.name)+'\')"><div class="hn">'+esc(it.name)+'<div class="hmeta">'+meta.join(' · ')+'</div></div>'+(it.last_price!=null?'<span class="hpr">'+(+it.last_price).toFixed(2)+' €</span>':'')+'<span class="pchev">›</span></li>';});
    h+='</ul></div>';}
  if(ITX===null)loadItx();
  if(EATERS===null)loadEaters();
  var log=getCookLog();
  var days=[];for(var dd=13;dd>=0;dd--){var dt=new Date();dt.setDate(dt.getDate()-dd);days.push(dt.toISOString().slice(0,10));}
  var kbd={};log.forEach(function(c){kbd[c.d]=(kbd[c.d]||0)+(+c.kcal||0);});
  var kdata=days.map(function(dy){return {label:dy.slice(8),val:kbd[dy]||0};});
  var byR={};log.forEach(function(c){byR[c.rid]=(byR[c.rid]||0)+1;});
  var top=Object.keys(byR).map(function(rid){var r=byRid(rid);return {n:byR[rid],t:r?r.title:'?'};}).sort(function(a,b){return b.n-a.n;}).slice(0,5);
  var gtot=(HIST||[]).reduce(function(a,x){return a+(+x.total_spent||0);},0);
  h+='<div class="psec"><div class="pgh">📊 Statistik</div>';
  h+='<div class="statcard"><div class="sclbl">Kalorien · letzte 14 Tage'+(goalKcal()?' · Ziel '+goalKcal()+'/Tag':'')+'</div>'+(log.length?barChart(kdata,goalKcal()):'<div class="chathint">Noch keine Koch-Einträge — tippe in einem Rezept „✓ Heute gekocht", dann füllt sich der Verlauf.</div>')+'</div>';
  if(top.length)h+='<div class="statcard"><div class="sclbl">Am häufigsten gekocht</div>'+top.map(function(t){return '<div class="hrow"><div class="hn">'+esc(t.t)+'</div><span class="hpr">'+t.n+'×</span></div>';}).join('')+'</div>';
  h+='<div class="statcard"><div class="sclbl">Einkauf gesamt</div><div class="hrow"><div class="hn">'+(HIST?HIST.length:0)+' Artikel erfasst</div><span class="hpr">'+gtot.toFixed(2)+' €</span></div></div>';
  h+='</div>';
  return h+`<div style="height:24px"></div>`;
}

/* ---------- COOK MODE ---------- */
let cookEl=null;
function openCook(id){const r=byId(id);
  const base=r.base_servings||2; const sv=state.servings[id]||base; const sc=sv/base;
  const dkey='cook_'+id; const done=store.get(dkey,{});
  let total=0; r.components.forEach(c=>c.steps.forEach(()=>total++));
  let gi=-1;
  const blocks=r.components.map(c=>{
    const ings=c.ingredients.map(x=>`<div class="cing"><span class="cq">${esc(fmtQty(x.qty,x.unit,sc))}</span><span>${esc(x.name)}${x.optional?' <span class="opt">opt.</span>':''}</span></div>`).join('');
    const steps=c.steps.map(s=>{gi++;const i=gi;
      return `<div class="cstep ${done[i]?'done':''}" id="cs${i}" onclick="toggleCook('${id}',${i})">
      <div class="n">${done[i]?'✓':(i+1)}</div><div style="flex:1"><div>${esc(s.instruction)}</div>
      ${s.duration_minutes?`<div class="ctimer">⏱ <span id="ct${i}">${s.duration_minutes}:00</span> <button onclick="event.stopPropagation();runCook(${i},${s.duration_minutes})">Start</button></div>`:''}
      ${s.temperature_c?`<div style="font-size:13px;color:var(--amber);margin-top:7px">🔥 ${s.temperature_c}°C</div>`:''}
      <button class="speak" onclick="event.stopPropagation();speak('${esc(s.instruction).replace(/'/g,"")}')">🔊 Vorlesen</button></div></div>`;
    }).join('');
    return `<div class="cgroup"><div class="cgh">${c.position}. ${esc(c.name)}<span class="cgb ${c.timing_class==='make_ahead'?'b-amber':'b-teal'}">${esc(c.timing_label||'')}</span></div>${ings?`<div class="cmise">${ings}</div>`:''}${steps}</div>`;
  }).join('');
  cookEl=document.createElement('div');cookEl.className='cook';
  cookEl.innerHTML=`<div class="top"><h2>${esc(r.title)}</h2><span class="close" onclick="closeCook()">Fertig ✓</span></div>
    <div style="font-size:12.5px;color:var(--mut2);padding:2px 16px 0">${total} Schritte · ${sv} Portionen · Mengen je Teil oben${('wakeLock' in navigator)?' · 📱 Display bleibt an':''}</div>${blocks}<div style="padding:12px 16px 0"><button class="btn btn-p" style="width:100%" onclick="cookApply('${r.id}')">✓ Gekocht — Vorrat abbuchen</button></div><div style="height:40px"></div>`;
  document.body.appendChild(cookEl);document.body.style.overflow='hidden';acquireWake();
}
function closeCook(){if(cookEl){cookEl.remove();cookEl=null;}document.body.style.overflow='';releaseWake();render();}
let wakeLk=null;
async function acquireWake(){try{if('wakeLock' in navigator)wakeLk=await navigator.wakeLock.request('screen');}catch(e){}}
function releaseWake(){try{if(wakeLk){wakeLk.release();wakeLk=null;}}catch(e){}}
document.addEventListener('visibilitychange',function(){if(document.visibilityState==='visible'&&cookEl)acquireWake();});
async function cookApply(id){
  if(typeof SB==='undefined'||!SB||!SB.rpc){toast('Vorrat-Abbuchen nur in der Live-App');return;}
  var r=byId(id);var base=(r&&r.base_servings)||2;var sv=state.servings[id]||base;var rid=(r&&r.rid)||id;
  toast('Prüfe Vorrat…');
  try{var pre=await SB.rpc('cook_apply',{p_recipe:rid,p_servings:sv,p_dry:true});
    if(pre.error){toast('Fehler: '+pre.error.message);return;}
    var rows=pre.data||[];
    if(!rows.length){toast('Keine passenden Vorräte zum Abbuchen');return;}
    showCookApply(rid,sv,rows);
  }catch(e){toast('Fehler beim Prüfen des Vorrats');}
}
function showCookApply(id,sv,rows){closeCA();
  var list=rows.map(function(x){return '<div class="caRow"><span class="caN">'+esc(x.zutat)+'</span><span class="caD">−'+esc(fmtQty(x.abzug_menge,x.einheit,1))+'</span><span class="caB">Rest '+esc(fmtQty(x.neuer_bestand,x.einheit,1))+'</span></div>';}).join('');
  var el=document.createElement('div');el.className='modal';el.id='caModal';
  el.innerHTML='<div class="box"><h3>Vorrat abbuchen?</h3><div class="caHint">'+rows.length+' Posten werden vom Bestand abgezogen (für '+sv+' Portionen):</div><div class="caList">'+list+'</div><div class="caBtns"><button class="btn btn-s" onclick="closeCA()">Abbrechen</button><button class="btn btn-p" onclick="doCookApply(\''+id+'\','+sv+')">Abbuchen</button></div></div>';
  el.onclick=function(e){if(e.target===el)closeCA();};document.body.appendChild(el);
}
function closeCA(){var e=document.getElementById('caModal');if(e)e.remove();}
async function doCookApply(id,sv){closeCA();toast('Buche ab…');
  try{var res=await SB.rpc('cook_apply',{p_recipe:id,p_servings:sv,p_dry:false});
    if(res.error){toast('Fehler: '+res.error.message);return;}
    var n=(res.data||[]).length;P=null;toast('✓ '+n+' Posten vom Vorrat abgebucht');
  }catch(e){toast('Fehler beim Abbuchen');}
}
function toggleCook(id,i){const k='cook_'+id;const d=store.get(k,{});d[i]=!d[i];store.set(k,d);const el=document.getElementById('cs'+i);if(el){el.classList.toggle('done',d[i]);el.querySelector('.n').textContent=d[i]?'✓':(i+1);}}
function runCook(i,min){let sec=min*60;const el=document.getElementById('ct'+i);if(el._iv){clearInterval(el._iv);el._iv=null;return;}
  el._iv=setInterval(()=>{sec--;el.textContent=Math.floor(sec/60)+':'+String(sec%60).padStart(2,'0');if(sec<=0){clearInterval(el._iv);el._iv=null;el.textContent='fertig!';try{navigator.vibrate&&navigator.vibrate([300,150,300]);}catch(e){}speak('Timer fertig');}},1000);}
function speak(t){try{const u=new SpeechSynthesisUtterance(t);u.lang='de-DE';speechSynthesis.cancel();speechSynthesis.speak(u);}catch(e){}}
function startTimer(min,ev){if(ev)ev.stopPropagation();toast('⏱ '+min+' min — Koch-Modus öffnen für laufende Timer');}

/* ---------- CHAT (Küchen-Assistent) ---------- */
function openChat(){renderChat();}
function closeChat(){var e=document.getElementById('chatEl');if(e)e.remove();}
function renderChat(){var ex=document.getElementById('chatEl');if(ex)ex.remove();
  var el=document.createElement('div');el.className='chatov';el.id='chatEl';
  var msgs=(state.chat||[]).map(function(m){return '<div class="cmsg '+m.role+'">'+esc(m.content)+'</div>';}).join('');
  el.innerHTML='<div class="chathead"><b>🍳 Küchen-Assistent</b><span class="close" onclick="closeChat()">Schließen ✕</span></div><div class="chatbody" id="chatBody">'+(msgs||'<div class="chathint">Frag mich was — z. B. „Was koche ich heute mit Kohlrabi?", „mach Beef Birria gesünder" oder „4-Gänge-Menü für Gäste".</div>')+'</div><div class="chatin"><input id="chatInput" placeholder="Nachricht…" onkeydown="if(event.key===\'Enter\')sendChat()"><button onclick="sendChat()">→</button></div>';
  document.body.appendChild(el);var b=document.getElementById('chatBody');if(b)b.scrollTop=b.scrollHeight;var inp=document.getElementById('chatInput');if(inp)inp.focus();}
async function sendChat(){var inp=document.getElementById('chatInput');if(!inp)return;var t=inp.value.trim();if(!t)return;
  if(typeof SB==='undefined'||!SB||!SB.functions){toast('Chat nur in der Live-App');return;}
  state.chat=state.chat||[];state.chat.push({role:'user',content:t});state.chat.push({role:'assistant',content:'…'});renderChat();
  try{var hist=state.chat.filter(function(m){return m.content!=='…';}).map(function(m){return {role:m.role,content:m.content};});
    var r=await SB.functions.invoke('ai',{body:{intent:'chat',messages:hist}});var d=(r&&r.data)||{};
    if(state.chat.length&&state.chat[state.chat.length-1].content==='…')state.chat.pop();
    if(d.error==='no_key')state.chat.push({role:'assistant',content:'⚠️ KI noch nicht aktiv — '+d.message});
    else if(d.error)state.chat.push({role:'assistant',content:'Fehler: '+(d.message||d.error)});
    else state.chat.push({role:'assistant',content:d.text||'(keine Antwort)'});
  }catch(e){if(state.chat.length&&state.chat[state.chat.length-1].content==='…')state.chat.pop();state.chat.push({role:'assistant',content:'Fehler: '+e});}
  renderChat();}
/* ---------- LINK-IMPORT ---------- */
function openImport(){state.imp={};renderImport();}
function closeImport(){var e=document.getElementById('impEl');if(e)e.remove();}
function renderImport(){var ex=document.getElementById('impEl');if(ex)ex.remove();var s=state.imp||{};
  var prev='';
  if(s.busy)prev='<div class="chathint">⏳ Hole & verarbeite das Rezept…</div>';
  else if(s.err)prev='<div class="chathint">⚠️ '+esc(s.err)+'</div>';
  else if(s.res){var r=s.res;prev='<div class="imprev"><h3>'+esc(r.title||'Rezept')+'</h3>'+(r.components||[]).map(function(c){return '<div class="impc"><b>'+esc(c.name||'')+'</b><ul>'+(c.ingredients||[]).map(function(i){return '<li>'+esc(((i.qty!=null?i.qty:'')+' '+(i.unit||'')+' '+(i.name||'')).trim())+'</li>';}).join('')+'</ul><ol>'+(c.steps||[]).map(function(st){return '<li>'+esc(typeof st==="string"?st:(st&&st.instruction||''))+'</li>';}).join('')+'</ol></div>';}).join('')+'<div class="chathint" style="margin-top:8px">Auf 2 Portionen & metrische Einheiten gerechnet. Speichern in deine Sammlung folgt.</div></div>';}
  var el=document.createElement('div');el.className='chatov';el.id='impEl';
  el.innerHTML='<div class="chathead"><b>🔗 Rezept importieren</b><span class="close" onclick="closeImport()">Schließen ✕</span></div><div class="chatbody"><div class="chathint">Link einer Kochseite/Blog ODER Rezept-Text/Caption einfügen. (TikTok/Insta sind oft login-gesperrt → dann den Text einfügen.)</div><textarea id="impText" class="imparea" placeholder="https://…  oder  Rezept-Text"></textarea><button class="btn btn-p" style="width:100%" onclick="doImport()">Importieren</button>'+prev+'</div>';
  document.body.appendChild(el);}
async function doImport(){var ta=document.getElementById('impText');if(!ta)return;var v=(ta.value||'').trim();if(!v)return;
  if(typeof SB==='undefined'||!SB||!SB.functions){toast('Import nur in der Live-App');return;}
  var isUrl=/^https?:\/\//i.test(v);state.imp={busy:true};renderImport();
  try{var r=await SB.functions.invoke('ai',{body:isUrl?{intent:'parse',url:v}:{intent:'parse',text:v}});var d=(r&&r.data)||{};
    if(d.error==='no_key')state.imp={err:d.message};
    else if(d.error)state.imp={err:d.message||d.error};
    else{var rec=null;try{rec=JSON.parse(String(d.text||'').replace(/^```json/i,'').replace(/^```/,'').replace(/```$/,'').trim());}catch(e){}
      if(rec&&rec.error)state.imp={err:rec.error};
      else state.imp=(rec&&rec.title)?{res:rec}:{err:'Kein Rezept erkannt. Versuch den reinen Rezept-Text.'};}
  }catch(e){state.imp={err:String(e)};}
  renderImport();}
/* ---------- MENÜS (Gäste-Menükarte) ---------- */
const COURSES=['Gruß','Vorspeise','Zwischengang','Hauptgang','Käse','Dessert','Petit Four'];
function getMenus(){return store.get('menus',[]);}
function newMenu(){var name=prompt('Name des Menüs (z. B. „Sommermenü 6 Gänge")');if(!name)return;var ms=getMenus();ms.push({name:name,items:[]});store.set('menus',ms);state.menu=ms.length-1;state.view='menucard';render();}
function openMenuCard(i){state.menu=i;state.view='menucard';window.scrollTo(0,0);render();}
function addToMenu(){openModal('Gang wählen',COURSES.map(function(c){return {label:c,fn:function(){pickMenuRecipe(c);}};}));}
function pickMenuRecipe(course){var opts=R.slice().sort(function(a,b){return a.title.localeCompare(b.title);}).map(function(r){return {label:r.title+' · '+((r.macros_per_serving&&r.macros_per_serving.kcal)||'?')+' kcal',fn:function(){var ms=getMenus();if(!ms[state.menu])return;ms[state.menu].items.push({course:course,id:r.id});store.set('menus',ms);closeModal();render();}};});openModal(course+' — Rezept',opts);}
function rmMenu(course,id){var ms=getMenus();var m=ms[state.menu];if(!m)return;m.items=(m.items||[]).filter(function(it){return !(it.course===course&&it.id===id);});store.set('menus',ms);render();}
function renameMenu(){var ms=getMenus();if(!ms[state.menu])return;var n=prompt('Neuer Name',ms[state.menu].name);if(n){ms[state.menu].name=n;store.set('menus',ms);render();}}
function delMenu(){if(!confirm('Dieses Menü löschen?'))return;var ms=getMenus();ms.splice(state.menu,1);store.set('menus',ms);state.view='menus';render();}
function viewMenus(){var ms=getMenus();
  var cards=ms.map(function(m,i){var its=m.items||[];var names=its.map(function(it){var r=byId(it.id);return r?r.title:'';}).filter(Boolean);
    return '<div class="day" onclick="openMenuCard('+i+')"><h3>'+esc(m.name)+'<span class="dk">'+its.length+' Gänge</span></h3><div class="mprev">'+(names.length?esc(names.slice(0,3).join(' · '))+(names.length>3?' …':''):'— leer —')+'</div></div>';}).join('');
  return '<div class="topbar"><h1>Menüs</h1><div class="sub">'+ms.length+' Menüs · Gäste-Menükarten</div></div><div class="planbar"><button class="btn btn-p" onclick="newMenu()">＋ Neues Menü</button></div>'+(cards||'<div class="empty-big">Noch keine Menüs.<br>Stell ein Menü für deine Gäste zusammen — Gang für Gang, als elegante Karte.</div>')+'<div style="height:20px"></div>';
}
function viewMenuCard(){var ms=getMenus();var m=ms[state.menu];if(!m)return viewMenus();
  var byC={};(m.items||[]).forEach(function(it){(byC[it.course]=byC[it.course]||[]).push(it.id);});
  var courses=COURSES.filter(function(c){return byC[c];}).map(function(c){
    var dishes=byC[c].map(function(id){var r=byId(id);if(!r)return'';return '<div class="mcdish"><div class="mct">'+esc(r.title)+'<span class="mcx" onclick="rmMenu(\''+esc(c)+'\',\''+r.id+'\')">×</span></div>'+(r.subtitle?'<div class="mcs">'+esc(r.subtitle)+'</div>':'')+'</div>';}).join('');
    return '<div class="mcourse"><div class="mcl">'+esc(c)+'</div>'+dishes+'</div>';}).join('');
  return '<div class="sheet"><div class="back" onclick="go(\'menus\')">‹ Menüs</div>'+
    '<div class="menucard"><div class="mctitle">'+esc(m.name)+'</div><div class="mcrule">·  ·  ·</div>'+(courses||'<div class="empty" style="text-align:center">Noch keine Gänge — ＋ Gericht unten.</div>')+'</div>'+
    '<div class="btnrow"><button class="btn btn-p" onclick="addToMenu()">＋ Gericht</button><button class="btn btn-s" onclick="renameMenu()">Umbenennen</button></div>'+
    '<div class="btnrow"><button class="btn btn-s" onclick="delMenu()">Menü löschen</button></div><div style="height:30px"></div></div>';
}
/* ---------- modal / nav / router ---------- */
let modalEl=null;
function openModal(title,opts){closeModal();modalEl=document.createElement('div');modalEl.className='modal';modalEl.onclick=e=>{if(e.target===modalEl)closeModal();};
  modalEl.innerHTML=`<div class="box"><h3>${esc(title)}</h3>${opts.map((o,i)=>`<div class="opt" data-i="${i}">${esc(o.label)}</div>`).join('')}</div>`;
  modalEl.querySelectorAll('.opt').forEach((e,i)=>e.onclick=opts[i].fn);document.body.appendChild(modalEl);}
function closeModal(){if(modalEl){modalEl.remove();modalEl=null;}}
function go(v){state.view=v;window.scrollTo(0,0);render();}
function nav(){const p=getPlan();const n=planIds(p).length;
  const items=[['recipes','📖','Rezepte'],['plan','🗓','Plan'],['shopping','🛒','Einkauf'],['vorrat','🧺','Vorrat'],['menus','🍽','Menüs']];
  document.getElementById('nav').innerHTML=items.map(([v,ic,la])=>`<button class="${state.view===v||(v==='recipes'&&state.view==='detail')?'on':''}" onclick="go('${v}')"><span class="ic">${ic}</span>${la}${v==='plan'&&n?`<span class="badge-n">${n}</span>`:''}</button>`).join('');}
function render(){const root=document.getElementById('root');
  root.innerHTML = state.view==='detail'?viewDetail():state.view==='plan'?viewPlan():state.view==='shopping'?viewShopping():state.view==='cart'?viewCart():state.view==='vorrat'?viewPantry():state.view==='menus'?viewMenus():state.view==='menucard'?viewMenuCard():viewRecipes();
  nav();}
function showLogin(msg){document.getElementById('nav').style.display='none';
  document.getElementById('root').innerHTML='<div style="max-width:420px;margin:11vh auto;padding:26px;text-align:center"><div style="font-size:42px">🍳</div><h1 style="font-family:Georgia,serif;color:var(--acc);margin:8px 0 2px;font-size:26px">Culinary OS</h1><div style="color:var(--mut);font-size:14px;margin-bottom:22px">Dein Kochbuch · 70 Rezepte, Plan, Vorrat</div><input id="em" type="email" autocomplete="username" placeholder="E-Mail" class="search" style="text-align:center;margin-bottom:8px"><input id="pw" type="password" autocomplete="current-password" placeholder="Passwort" class="search" style="text-align:center"><button class="btn btn-p" style="width:100%;margin-top:12px" onclick="doLogin()">Anmelden</button><div id="lmsg" style="font-size:13px;color:var(--mut);margin-top:16px;line-height:1.5">'+(msg||'')+'</div></div>';}
async function doLogin(){var em=(document.getElementById('em').value||'').trim();var pw=(document.getElementById('pw').value||'');if(!em||!pw)return;document.getElementById('lmsg').textContent='Anmelden…';var r=await SB.auth.signInWithPassword({email:em,password:pw});if(r.error){document.getElementById('lmsg').textContent='Fehler: '+r.error.message;}else{boot();}}
async function loadData(){var r=await SB.rpc('app_recipes');if(r.error)throw r.error;var rec=r.data||[];D={recipes:rec};R=rec;SLOTS=Array.from(new Set(rec.map(function(x){return x.slot}).filter(Boolean))).sort();}
async function boot(){var s=(await SB.auth.getSession()).data.session;if(!s){showLogin();return;}try{await loadData();}catch(e){showLogin('Fehler beim Laden: '+((e&&e.message)||e));return;}document.getElementById('nav').style.display='';var _p=new URLSearchParams(location.search);if(_p.get('r')){var rr=byId(_p.get('r'));if(rr){state.recipe=rr;state.view='detail';}}else if(_p.get('v')){state.view=_p.get('v');}render();}
SB.auth.onAuthStateChange(function(_e,s){if(s&&!R.length)boot();});
boot();
