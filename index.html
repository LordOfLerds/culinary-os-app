const esc = s => (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
function fmtQty(q,u,scale){ if(q==null) return ''; let f=q*(scale||1); let s=Math.abs(f-Math.round(f))<1e-9?String(Math.round(f)):(Math.round(f*100)/100).toString(); return (s+' '+(u||'')).trim(); }
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),1900);}

function spider(fl){const cx=120,cy=96,Rr=64,n=FL.length;
  const pt=(i,fr)=>{const a=(-90+i*360/n)*Math.PI/180;return [cx+Rr*fr*Math.cos(a),cy+Rr*fr*Math.sin(a)];};
  let rings='';for(let g=1;g<=5;g++){let p=FL.map((_,i)=>pt(i,g/5).map(v=>v.toFixed(1)).join(',')).join(' ');rings+=`<polygon points="${p}" fill="none" stroke="#ece7dd" stroke-width="1"/>`;}
  let ax='',lab='';FL.forEach(([k,la],i)=>{const[ex,ey]=pt(i,1);ax+=`<line x1="${cx}" y1="${cy}" x2="${ex.toFixed(1)}" y2="${ey.toFixed(1)}" stroke="#e1dacd"/>`;const[lx,ly]=pt(i,1.26);let an=Math.abs(lx-cx)<2?'middle':(lx>cx?'start':'end');let dy=ly<cy-22?-2:(ly>cy+22?11:4);const v=fl[k];lab+=`<text x="${lx.toFixed(1)}" y="${(ly+dy).toFixed(1)}" text-anchor="${an}" font-size="10.5" fill="#6b6862" font-family="-apple-system,Arial">${la} <tspan font-weight="700" fill="#4a3f8a">${v==null?'–':v}</tspan></text>`;});
  let dp=FL.map(([k],i)=>pt(i,(+fl[k]||0)/5).map(v=>v.toFixed(1)).join(',')).join(' ');
  let dots=FL.map(([k],i)=>{const[x,y]=pt(i,(+fl[k]||0)/5);return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.3" fill="#4a3f8a"/>`}).join('');
  return `<svg viewBox="0 0 240 200" width="190" height="158" style="overflow:visible">${rings}${ax}<polygon points="${dp}" fill="rgba(74,63,138,.16)" stroke="#4a3f8a" stroke-width="1.6"/>${dots}${lab}</svg>`;
}

/* ---------- RECIPES ---------- */
function getFav(){return store.get('fav',{});}
function isFav(id){return !!getFav()[id];}
function toggleFav(id,ev){if(ev)ev.stopPropagation();var f=getFav();if(f[id])delete f[id];else f[id]=1;store.set('fav',f);render();}
function getRecent(){return store.get('recent',[]);}
function pushRecent(id){var a=getRecent().filter(function(x){return x!==id;});a.unshift(id);if(a.length>10)a=a.slice(0,10);store.set('recent',a);}
function toggleFavOnly(){state.favOnly=!state.favOnly;render();}
function recipeCard(r){const m=r.macros_per_serving||{};const fv=isFav(r.id);
  return `<div class="rc" onclick="openRecipe('${r.id}')">
    <span class="fav ${fv?'on':''}" onclick="toggleFav('${r.id}',event)">${fv?'★':'☆'}</span>

  const q=state.q.trim().toLowerCase();

  const sel=(id,label,opts,val)=>'<select class="fsel" onchange="setF(\''+id+'\',this.value)"><option value="">'+label+'</option>'+opts.map(o=>'<option'+(val===o?' selected':'')+'>'+esc(o)+'</option>').join('')+'</select>';

  if(state.favOnly) list=list.filter(r=>isFav(r.id));

  if(state.course) list=list.filter(r=>r.category_label===state.course);
  if(state.protein) list=list.filter(r=>r.protein===state.protein);
  if(q) list=list.filter(r=>(r.title+' '+(r.subtitle||'')+' '+(r.tags||[]).join(' ')+' '+(r.cuisine||[]).join(' ')+' '+(r.protein||'')+' '+(r.category_label||'')).toLowerCase().includes(q));
  const sort=state.sort||'slot'; const num=v=>(v==null?1e9:v);

  list=list.slice().sort((a,b)=> sort==='kcald'?kc(b)-kc(a) : sort==='kcal'?kc(a)-kc(b) : sort==='time'?num(a.total_minutes)-num(b.total_minutes) : sort==='title'?(a.title||'').localeCompare(b.title||'') : ((a.slot||'').localeCompare(b.slot||'')||(a.title||'').localeCompare(b.title||'')));

    <input class="search" placeholder="Suchen: Titel, Küche, Tag…" value="${esc(state.q)}" oninput="state.q=this.value;render()">
    <div class="filters">${sel('cuisine','Küche',uniq('cuisine'),state.cuisine||'')}${sel('course','Gang/Art',uniq('category_label'),state.course||'')}${sel('protein','Protein',uniq('protein'),state.protein||'')}<select class="fsel" onchange="setF('sort',this.value)"><option value="slot"${sort==='slot'?' selected':''}>↕ Slot</option><option value="kcald"${sort==='kcald'?' selected':''}>kcal ↓</option><option value="kcal"${sort==='kcal'?' selected':''}>kcal ↑</option><option value="time"${sort==='time'?' selected':''}>Zeit ↑</option><option value="title"${sort==='title'?' selected':''}>A–Z</option></select>${active?'<button class="fclear" onclick="clearF()">✕</button>':''}</div></div>
    <div class="chips">${favChip}${chips}</div>${recentRow}<div class="count">${list.length} Rezepte</div>
    <div class="grid">${list.map(recipeCard).join('')||(state.favOnly?'<div class="empty-big">Noch keine Favoriten — tippe ☆ auf einer Rezeptkarte.</div>':'<div class="empty-big">Nichts gefunden.</div>')}</div>`;

function setServ(id,v){state.servings[id]=v;render();}
let RATE=null;
async function loadRatings(){if(typeof SB==='undefined'||!SB||!SB.from)return;try{var r=await SB.from('recipe_ratings').select('recipe_id,stars').is('eater_id',null);RATE={};(r.data||[]).forEach(function(x){RATE[x.recipe_id]=x.stars;});}catch(e){RATE={};}render();}
function myRating(id){return (RATE&&RATE[id])||0;}
async function rateRecipe(id,stars){
  if(typeof SB==='undefined'||!SB||!SB.from){toast('Bewerten nur in der Live-App');return;}
  var prev=myRating(id);RATE=RATE||{};RATE[id]=stars;render();
  try{var ex=await SB.from('recipe_ratings').select('id').eq('recipe_id',id).is('eater_id',null).limit(1);
    if(ex.error)throw ex.error;
    if(ex.data&&ex.data.length){var up=await SB.from('recipe_ratings').update({stars:stars}).eq('id',ex.data[0].id);if(up.error)throw up.error;}
    else{var ins=await SB.from('recipe_ratings').insert({recipe_id:id,stars:stars});if(ins.error)throw ins.error;}
    toast('★ '+stars+' gespeichert');
  }catch(e){if(prev)RATE[id]=prev;else delete RATE[id];render();toast('Fehler beim Speichern');}
}
function openRecipe(id){state.recipe=byId(id);pushRecent(id);state.view='detail';window.scrollTo(0,0);render();}

/* ---------- PLAN (Slot-Planer wie Notion) ---------- */
const SLOT_ORDER=['Beef','Chicken-1','Chicken-2','Fish','Veg-Mi','Veg-So','Cheat','Flex'];
const SLOT_EMO={'Beef':'🥩','Chicken-1':'🍗','Chicken-2':'🍗','Fish':'🐟','Veg-Mi':'🥗','Veg-So':'🥦','Cheat':'🍔','Flex':'✨'};
function getPlan(){var p=store.get('plan',{});var ch=false;
  Object.keys(p).forEach(function(d){var v=p[d];if(Array.isArray(v)){var o={};v.forEach(function(id){var r=byId(id);var s=(r&&r.slot)||'Flex';if(!o[s])o[s]=id;});p[d]=o;ch=true;}});
  if(ch)store.set('plan',p);return p;}
function planIds(p){p=p||getPlan();var o=[];Object.keys(p).forEach(function(d){var ds=p[d];if(ds)Object.keys(ds).forEach(function(s){if(ds[s])o.push(ds[s]);});});return o;}
function dayKcal(ds){if(!ds)return 0;return Object.keys(ds).reduce(function(a,s){var r=byId(ds[s]);return a+((r&&r.macros_per_serving&&r.macros_per_serving.kcal)||0);},0);}
function addToPlan(id){var r=byId(id);var slot=(r&&r.slot&&SLOT_ORDER.indexOf(r.slot)>=0)?r.slot:'Flex';
  openModal('An welchen Tag?',DAYS.map(function(d,i){return {label:d,fn:function(){assignSlot(i,slot,id);toast(r.title+' → '+d+' · '+slot);}};}));}
function pickDay(day){openModal(DAYS[day]+' · Slot wählen',SLOT_ORDER.map(function(s){var p=getPlan();var taken=p[day]&&p[day][s]?byId(p[day][s]):null;
  return {label:(SLOT_EMO[s]||'')+' '+s+(taken?' · '+taken.title:''),fn:function(){pickSlot(day,s);}};}));}
function pickSlot(day,slot){var cands=R.filter(function(r){return r.slot===slot;});if(!cands.length)cands=R.slice();
  cands.sort(function(a,b){return a.title.localeCompare(b.title);});
  var opts=[{label:'🎲 Zufallsvorschlag',fn:function(){assignSlot(day,slot,cands[Math.floor(Math.random()*cands.length)].id);}}];
  cands.forEach(function(r){opts.push({label:r.title+' · '+((r.macros_per_serving&&r.macros_per_serving.kcal)||'?')+' kcal',fn:function(){assignSlot(day,slot,r.id);}});});
  openModal(DAYS[day]+' · '+(SLOT_EMO[slot]||'')+' '+slot,opts);}
function assignSlot(day,slot,id){var p=getPlan();p[day]=p[day]||{};p[day][slot]=id;store.set('plan',p);closeModal();render();}
function rmPlan(day,slot){var p=getPlan();if(p[day]){delete p[day][slot];if(!Object.keys(p[day]).length)delete p[day];}store.set('plan',p);render();}
function suggestWeek(){if(!confirm('Leere Tage mit je 1 Vorschlag füllen?'))return;var p=getPlan();
  DAYS.forEach(function(d,i){if(p[i]&&Object.keys(p[i]).length)return;var slot=SLOT_ORDER[Math.floor(Math.random()*6)];var c=R.filter(function(r){return r.slot===slot;});if(c.length){p[i]=p[i]||{};p[i][slot]=c[Math.floor(Math.random()*c.length)].id;}});
  store.set('plan',p);render();}
function autoPlanWeek(){
  if(!confirm('Ganze Woche automatisch planen? Überschreibt den aktuellen Plan.'))return;
  var rot=['Beef','Chicken-1','Fish','Veg-Mi','Chicken-2','Cheat','Veg-So'];
  var fav=getFav();
  var soonN=(P||[]).filter(function(it){return it.days!==null&&it.days<=6;}).map(function(it){return (it.name||'').toLowerCase();}).filter(function(n){return n.length>=4;});
  function score(r){var s=fav[r.id]?10:0;var ing=[];(r.components||[]).forEach(function(c){(c.ingredients||[]).forEach(function(i){ing.push((i.name||'').toLowerCase());});});soonN.forEach(function(n){if(ing.some(function(x){return x.indexOf(n)>=0||(x.length>=4&&n.indexOf(x)>=0);}))s+=3;});return s;}
  var used={},plan={};
  rot.forEach(function(slot,day){
    var cands=R.filter(function(r){return r.slot===slot&&!used[r.id];});
    if(!cands.length)cands=R.filter(function(r){return !used[r.id];});
    if(!cands.length)return;
    var mx=Math.max.apply(null,cands.map(score));
    var top=cands.filter(function(c){return score(c)===mx;});
    var pick=top[Math.floor(Math.random()*top.length)];
    used[pick.id]=1;plan[day]={};plan[day][slot]=pick.id;
  });
  store.set('plan',plan);render();}
function viewPlan(){var p=getPlan();
  var days=DAYS.map(function(d,i){var ds=p[i]||{};
    var rows=SLOT_ORDER.filter(function(s){return ds[s];}).map(function(s){var r=byId(ds[s]);if(!r)return'';
      return '<div class="prow"><span class="slotb">'+(SLOT_EMO[s]||'')+' '+esc(s)+'</span><span class="t" onclick="openRecipe(\''+r.id+'\')">'+esc(r.title)+'<div class="k">'+((r.macros_per_serving&&r.macros_per_serving.kcal)||'?')+' kcal</div></span><span class="x" onclick="rmPlan('+i+',\''+esc(s)+'\')">×</span></div>';}).join('');
    var kc=dayKcal(ds);
    return '<div class="day"><h3>'+d+(kc?'<span class="dk">'+kc+' kcal</span>':'')+'</h3>'+(rows||'<div class="empty">— noch nichts geplant —</div>')+'<button class="addslot" onclick="pickDay('+i+')">＋ Gericht in Slot</button></div>';}).join('');
  var total=planIds(p).length;
  return '<div class="topbar"><h1>Wochenplan</h1><div class="sub">'+total+' Gerichte · Slots wie in Notion · ＋ pro Tag</div></div><div class="planbar"><button class="btn btn-p" onclick="autoPlanWeek()">✨ Auto-Woche</button><button class="btn btn-s" onclick="suggestWeek()">🎲 Leere füllen</button></div>'+days+'<div style="height:20px"></div>';
}

/* ---------- SHOPPING ---------- */
function pantryHave(name,unit){if(!P||!P.length)return 0;var bl=(name||'').toLowerCase().trim(),bu=(unit||'').toLowerCase().trim();var t=0;
  P.forEach(function(it){var au=(it.unit||'').toLowerCase().trim();if(au!==bu)return;var al=(it.name||'').toLowerCase().trim();
    if((al.length>=4&&bl.indexOf(al)>=0)||(bl.length>=4&&al.indexOf(bl)>=0))t+=(+it.qty||0);});
  return t;}
function viewShopping(){const p=getPlan();const ids=planIds(p);
  if(!ids.length) return `<div class="topbar"><h1>Einkaufsliste</h1></div><div class="empty-big">Noch nichts geplant.<br>Füge Gerichte über „＋ Zum Plan" hinzu — die Zutaten landen automatisch hier, nach Kategorie sortiert.</div>`;
  if(P===null)loadPantry();
  const agg={}; // aisle -> name -> {byUnit:{unit:qty}}
  ids.forEach(id=>{const r=byId(id);if(!r)return;r.components.forEach(c=>c.ingredients.forEach(i=>{
    const a=i.aisle||'snacks_sonstiges';const key=i.name;agg[a]=agg[a]||{};agg[a][key]=agg[a][key]||{};
    const u=i.unit||'';agg[a][key][u]=(agg[a][key][u]||0)+(+i.qty||0);
  }));});
  const done=store.get('shop_done',{});
  const order=Object.keys(AISLE_DE).filter(a=>agg[a]);
  let buyN=0,haveN=0;
  const html=order.map(a=>{const items=Object.keys(agg[a]).sort().map(nm=>{
    let parts=[],covered=true,anyHave=false;
    Object.entries(agg[a][nm]).forEach(([u,q])=>{if(!q)return;const have=pantryHave(nm,u);if(have>0)anyHave=true;const buy=q-have;if(buy>1e-9){covered=false;parts.push(fmtQty(buy,u,1));}});
    const k=a+'|'+nm;
    if(covered&&anyHave){haveN++;return `<li class="have"><span class="ck">✓</span><span>${esc(nm)}</span><span class="q hk">im Vorrat</span></li>`;}
    buyN++;const dn=done[k]?'done':'';const qs=parts.join(' + ');
    return `<li class="${dn}" onclick="toggleShop('${esc(k).replace(/'/g,"\\'")}')"><span class="ck">✓</span><span>${esc(nm)}${anyHave?' <span class="part">tlw. da</span>':''}</span><span class="q">${esc(qs)}</span></li>`;
  }).join('');
    return `<div class="aisle"><h3>${AISLE_DE[a]}</h3><ul class="shl">${items}</ul></div>`;}).join('');
  const sub=P===null?`${ids.length} Gerichte · Vorrat lädt…`:`${ids.length} Gerichte · ${buyN} zu kaufen${haveN?` · ${haveN} im Vorrat ✓`:''}`;
  return `<div class="topbar"><h1>Einkaufsliste</h1><div class="sub">${sub}</div></div>${html}<div class="btnrow"><button class="btn btn-s" onclick="if(confirm('Abgehakte zurücksetzen?')){store.set('shop_done',{});render();}">Haken zurücksetzen</button></div><div style="height:20px"></div>`;
}
function toggleShop(k){const d=store.get('shop_done',{});d[k]=!d[k];store.set('shop_done',d);render();}

let P=null;
async function loadPantry(){try{const r=await SB.rpc('app_pantry');P=(r&&r.data)||[];}catch(e){P=[];}render();}
let HIST=null;
async function loadHist(){if(typeof SB==='undefined'||!SB||!SB.rpc)return;try{var r=await SB.rpc('app_ingredient_history');HIST=r.data||[];}catch(e){HIST=[];}render();}
function pAmpel(d){if(d===null||d===undefined)return['',''];if(d<0)return['#c0392b','abgelaufen'];if(d===0)return['#e67e22','heute'];if(d===1)return['#e67e22','morgen'];if(d<=6)return['#d4a017',d+' Tage'];return['#3a7d44',d+' Tage'];}
function recipesUsing(items){var names=items.map(function(it){return (it.name||'').toLowerCase().trim();}).filter(function(n){return n.length>=3;});
  if(!names.length||!R.length)return[];
  var scored=R.map(function(r){var ing=[];(r.components||[]).forEach(function(c){(c.ingredients||[]).forEach(function(i){ing.push((i.name||'').toLowerCase());});});
    var hits=names.filter(function(n){return ing.some(function(x){return (n.length>=4&&x.indexOf(n)>=0)||(x.length>=4&&n.indexOf(x)>=0);});});
    return {r:r,hits:hits.length};}).filter(function(s){return s.hits>0;});
  scored.sort(function(a,b){return b.hits-a.hits||((a.r.total_minutes||999)-(b.r.total_minutes||999));});return scored.slice(0,4);}
function viewPantry(){
  if(P===null){loadPantry();return `<div class="topbar"><h1>Vorrat</h1><div class="sub">lädt…</div></div><div class="empty-big">Bestand wird geladen…</div>`;}
  if(!P.length)return `<div class="topbar"><h1>Vorrat</h1></div><div class="empty-big">Noch kein Vorrat erfasst.<br>Belege importieren oder Artikel anlegen — dann erscheint hier dein Bestand mit MHD-Ampel.</div>`;
  const LOC={kuehlschrank:'❄️ Kühlschrank',gefrier:'🧊 Gefrierfach',speis:'🗄 Speis / Vorrat',gewuerzregal:'🧂 Gewürze',sonstige:'📦 Sonstiges'};
  const soonItems=P.filter(it=>it.days!==null&&it.days<=6).sort((a,b)=>a.days-b.days);const soon=soonItems.length;
  const g={};P.forEach(it=>{const k=it.location||'sonstige';(g[k]=g[k]||[]).push(it);});
  let h=`<div class="topbar"><h1>Vorrat</h1><div class="sub">${P.length} Artikel${soon?` · <b style="color:#e67e22">${soon} bald fällig</b>`:''} · MHD-Ampel</div></div>`;
  if(soonItems.length){var recs=recipesUsing(soonItems);
    h+='<div class="useup"><div class="uh">🔥 Use-it-up · zuerst kochen</div><div class="uitems">'+soonItems.map(function(it){return esc(it.name)+' <span class="ud">'+pAmpel(it.days)[1]+'</span>';}).join(' · ')+'</div>';
    h+=recs.length?('<div class="urecs">'+recs.map(function(s){var r=s.r;return '<div class="urec" onclick="openRecipe(\''+r.id+'\')"><span class="us">'+s.hits+'×</span><span class="ut">'+esc(r.title)+'</span><span class="uk">'+((r.macros_per_serving&&r.macros_per_serving.kcal)||'?')+' kcal</span></div>';}).join('')+'</div>'):'<div class="uitems" style="color:var(--mut2)">Keine passenden Rezepte im Buch.</div>';
    h+='</div>';}
  Object.keys(g).forEach(loc=>{
    h+=`<div class="psec"><div class="pgh">${LOC[loc]||esc(loc)}</div><ul class="plist">`;
    g[loc].forEach(it=>{const a=pAmpel(it.days);
      h+=`<li class="pit"><span class="pdot" style="background:${a[0]||'var(--line)'}"></span><span class="pn">${esc(it.name)}${it.opened?'<span class="popen">offen</span>':''}</span><span class="pq">${esc(String(it.qty))} ${esc(it.unit||'')}</span>${a[1]?`<span class="pmhd" style="color:${a[0]}">${a[1]}</span>`:''}</li>`;});
    h+=`</ul></div>`;});
  if(HIST===null)loadHist();
  else if(HIST.length){var spent=HIST.reduce(function(a,x){return a+(+x.total_spent||0);},0);
    h+='<div class="psec"><div class="pgh">📊 Einkaufs-Historie'+(spent?' · '+spent.toFixed(2)+' € gesamt':'')+'</div><ul class="plist">';
    HIST.forEach(function(it){var meta=[];if(it.qty!=null)meta.push(esc(fmtQty(it.qty,it.unit||'',1)));if(it.buys)meta.push(it.buys+'× gekauft');if(it.consumed)meta.push('−'+esc(fmtQty(it.consumed,'',1))+' verbraucht');
      h+='<li class="hrow"><div class="hn">'+esc(it.name)+'<div class="hmeta">'+meta.join(' · ')+'</div></div>'+(it.last_price!=null?'<span class="hpr">'+(+it.last_price).toFixed(2)+' €</span>':'')+'</li>';});
    h+='</ul></div>';}
  return h+`<div style="height:24px"></div>`;
}

/* ---------- COOK MODE ---------- */
let cookEl=null;
function openCook(id){const r=byId(id);
  const base=r.base_servings||2; const sv=state.servings[id]||base; const sc=sv/base;
  const dkey='cook_'+id; const done=store.get(dkey,{});
  let total=0; r.components.forEach(c=>c.steps.forEach(()=>total++));
  let gi=-1;
  const blocks=r.components.map(c=>{
    const ings=c.ingredients.map(x=>`<div class="cing"><span class="cq">${esc(fmtQty(x.qty,x.unit,sc))}</span><span>${esc(x.name)}${x.optional?' <span class="opt">opt.</span>':''}</span></div>`).join('');
    const steps=c.steps.map(s=>{gi++;const i=gi;
      return `<div class="cstep ${done[i]?'done':''}" id="cs${i}" onclick="toggleCook('${id}',${i})">
      <div class="n">${done[i]?'✓':(i+1)}</div><div style="flex:1"><div>${esc(s.instruction)}</div>
      ${s.duration_minutes?`<div class="ctimer">⏱ <span id="ct${i}">${s.duration_minutes}:00</span> <button onclick="event.stopPropagation();runCook(${i},${s.duration_minutes})">Start</button></div>`:''}
      ${s.temperature_c?`<div style="font-size:13px;color:var(--amber);margin-top:7px">🔥 ${s.temperature_c}°C</div>`:''}
      <button class="speak" onclick="event.stopPropagation();speak('${esc(s.instruction).replace(/'/g,"")}')">🔊 Vorlesen</button></div></div>`;
    }).join('');
    return `<div class="cgroup"><div class="cgh">${c.position}. ${esc(c.name)}<span class="cgb ${c.timing_class==='make_ahead'?'b-amber':'b-teal'}">${esc(c.timing_label||'')}</span></div>${ings?`<div class="cmise">${ings}</div>`:''}${steps}</div>`;
  }).join('');
  cookEl=document.createElement('div');cookEl.className='cook';
  cookEl.innerHTML=`<div class="top"><h2>${esc(r.title)}</h2><span class="close" onclick="closeCook()">Fertig ✓</span></div>
    <div style="font-size:12.5px;color:var(--mut2);padding:2px 16px 0">${total} Schritte · ${sv} Portionen · Mengen je Teil oben${('wakeLock' in navigator)?' · 📱 Display bleibt an':''}</div>${blocks}<div style="padding:12px 16px 0"><button class="btn btn-p" style="width:100%" onclick="cookApply('${r.id}')">✓ Gekocht — Vorrat abbuchen</button></div><div style="height:40px"></div>`;
  document.body.appendChild(cookEl);document.body.style.overflow='hidden';acquireWake();
}
function closeCook(){if(cookEl){cookEl.remove();cookEl=null;}document.body.style.overflow='';releaseWake();render();}
let wakeLk=null;
async function acquireWake(){try{if('wakeLock' in navigator)wakeLk=await navigator.wakeLock.request('screen');}catch(e){}}
function releaseWake(){try{if(wakeLk){wakeLk.release();wakeLk=null;}}catch(e){}}
document.addEventListener('visibilitychange',function(){if(document.visibilityState==='visible'&&cookEl)acquireWake();});
async function cookApply(id){
  if(typeof SB==='undefined'||!SB||!SB.rpc){toast('Vorrat-Abbuchen nur in der Live-App');return;}
  var r=byId(id);var base=(r&&r.base_servings)||2;var sv=state.servings[id]||base;var rid=(r&&r.rid)||id;
  toast('Prüfe Vorrat…');
  try{var pre=await SB.rpc('cook_apply',{p_recipe:rid,p_servings:sv,p_dry:true});
    if(pre.error){toast('Fehler: '+pre.error.message);return;}
    var rows=pre.data||[];
    if(!rows.length){toast('Keine passenden Vorräte zum Abbuchen');return;}
    showCookApply(rid,sv,rows);
  }catch(e){toast('Fehler beim Prüfen des Vorrats');}
}
function showCookApply(id,sv,rows){closeCA();
  var list=rows.map(function(x){return '<div class="caRow"><span class="caN">'+esc(x.zutat)+'</span><span class="caD">−'+esc(fmtQty(x.abzug_menge,x.einheit,1))+'</span><span class="caB">Rest '+esc(fmtQty(x.neuer_bestand,x.einheit,1))+'</span></div>';}).join('');
  var el=document.createElement('div');el.className='modal';el.id='caModal';
  el.innerHTML='<div class="box"><h3>Vorrat abbuchen?</h3><div class="caHint">'+rows.length+' Posten werden vom Bestand abgezogen (für '+sv+' Portionen):</div><div class="caList">'+list+'</div><div class="caBtns"><button class="btn btn-s" onclick="closeCA()">Abbrechen</button><button class="btn btn-p" onclick="doCookApply(\''+id+'\','+sv+')">Abbuchen</button></div></div>';
  el.onclick=function(e){if(e.target===el)closeCA();};document.body.appendChild(el);
}
function closeCA(){var e=document.getElementById('caModal');if(e)e.remove();}
async function doCookApply(id,sv){closeCA();toast('Buche ab…');
  try{var res=await SB.rpc('cook_apply',{p_recipe:id,p_servings:sv,p_dry:false});
    if(res.error){toast('Fehler: '+res.error.message);return;}
    var n=(res.data||[]).length;P=null;toast('✓ '+n+' Posten vom Vorrat abgebucht');
  }catch(e){toast('Fehler beim Abbuchen');}
}
function toggleCook(id,i){const k='cook_'+id;const d=store.get(k,{});d[i]=!d[i];store.set(k,d);const el=document.getElementById('cs'+i);if(el){el.classList.toggle('done',d[i]);el.querySelector('.n').textContent=d[i]?'✓':(i+1);}}
function runCook(i,min){let sec=min*60;const el=document.getElementById('ct'+i);if(el._iv){clearInterval(el._iv);el._iv=null;return;}
  el._iv=setInterval(()=>{sec--;el.textContent=Math.floor(sec/60)+':'+String(sec%60).padStart(2,'0');if(sec<=0){clearInterval(el._iv);el._iv=null;el.textContent='fertig!';try{navigator.vibrate&&navigator.vibrate([300,150,300]);}catch(e){}speak('Timer fertig');}},1000);}
function speak(t){try{const u=new SpeechSynthesisUtterance(t);u.lang='de-DE';speechSynthesis.cancel();speechSynthesis.speak(u);}catch(e){}}
function startTimer(min,ev){if(ev)ev.stopPropagation();toast('⏱ '+min+' min — Koch-Modus öffnen für laufende Timer');}

/* ---------- modal / nav / router ---------- */
let modalEl=null;
function openModal(title,opts){closeModal();modalEl=document.createElement('div');modalEl.className='modal';modalEl.onclick=e=>{if(e.target===modalEl)closeModal();};
  modalEl.innerHTML=`<div class="box"><h3>${esc(title)}</h3>${opts.map((o,i)=>`<div class="opt" data-i="${i}">${esc(o.label)}</div>`).join('')}</div>`;
  modalEl.querySelectorAll('.opt').forEach((e,i)=>e.onclick=opts[i].fn);document.body.appendChild(modalEl);}
function closeModal(){if(modalEl){modalEl.remove();modalEl=null;}}
function go(v){state.view=v;window.scrollTo(0,0);render();}
function nav(){const p=getPlan();const n=planIds(p).length;
  const items=[['recipes','📖','Rezepte'],['plan','🗓','Plan'],['shopping','🛒','Einkauf'],['vorrat','🧺','Vorrat']];
  document.getElementById('nav').innerHTML=items.map(([v,ic,la])=>`<button class="${state.view===v||(v==='recipes'&&state.view==='detail')?'on':''}" onclick="go('${v}')"><span class="ic">${ic}</span>${la}${v==='plan'&&n?`<span class="badge-n">${n}</span>`:''}</button>`).join('');}
function render(){const root=document.getElementById('root');
  root.innerHTML = state.view==='detail'?viewDetail():state.view==='plan'?viewPlan():state.view==='shopping'?viewShopping():state.view==='vorrat'?viewPantry():viewRecipes();
  nav();}
function showLogin(msg){document.getElementById('nav').style.display='none';
  document.getElementById('root').innerHTML='<div style="max-width:420px;margin:11vh auto;padding:26px;text-align:center"><div style="font-size:42px">🍳</div><h1 style="font-family:Georgia,serif;color:var(--acc);margin:8px 0 2px;font-size:26px">Culinary OS</h1><div style="color:var(--mut);font-size:14px;margin-bottom:22px">Dein Kochbuch · 70 Rezepte, Plan, Vorrat</div><input id="em" type="email" autocomplete="username" placeholder="E-Mail" class="search" style="text-align:center;margin-bottom:8px"><input id="pw" type="password" autocomplete="current-password" placeholder="Passwort" class="search" style="text-align:center"><button class="btn btn-p" style="width:100%;margin-top:12px" onclick="doLogin()">Anmelden</button><div id="lmsg" style="font-size:13px;color:var(--mut);margin-top:16px;line-height:1.5">'+(msg||'')+'</div></div>';}
async function doLogin(){var em=(document.getElementById('em').value||'').trim();var pw=(document.getElementById('pw').value||'');if(!em||!pw)return;document.getElementById('lmsg').textContent='Anmelden…';var r=await SB.auth.signInWithPassword({email:em,password:pw});if(r.error){document.getElementById('lmsg').textContent='Fehler: '+r.error.message;}else{boot();}}
async function loadData(){var r=await SB.rpc('app_recipes');if(r.error)throw r.error;var rec=r.data||[];D={recipes:rec};R=rec;SLOTS=Array.from(new Set(rec.map(function(x){return x.slot}).filter(Boolean))).sort();}
async function boot(){var s=(await SB.auth.getSession()).data.session;if(!s){showLogin();return;}try{await loadData();}catch(e){showLogin('Fehler beim Laden: '+((e&&e.message)||e));return;}document.getElementById('nav').style.display='';var _p=new URLSearchParams(location.search);if(_p.get('r')){var rr=byId(_p.get('r'));if(rr){state.recipe=rr;state.view='detail';}}else if(_p.get('v')){state.view=_p.get('v');}render();}
SB.auth.onAuthStateChange(function(_e,s){if(s&&!R.length)boot();});
boot();
</script></body></html>
